name: OWASP ZAP Baseline

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: owasp-zap-baseline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_URL: ${{ github.event_name == 'pull_request' && 'http://127.0.0.1:4173' || 'https://www.waterapps.com.au' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Start local site server for pull requests
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --directory . >/tmp/waterapps-site-http.log 2>&1 &
          echo $! > /tmp/waterapps-site-http.pid
          sleep 3
          curl -fsS "${TARGET_URL}" >/dev/null

      - name: Run OWASP ZAP baseline scan
        id: zap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p zap-report
          chmod -R 777 zap-report

          set +e
          docker run --rm --network=host --user root -v "${PWD}/zap-report:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${TARGET_URL}" \
            -m 5 \
            -J zap-report.json \
            -w zap-report.md \
            -r zap-report.html \
            -I
          rc=$?
          set -e

          echo "exit_code=${rc}" >> "${GITHUB_OUTPUT}"

          # ZAP baseline exit codes:
          # 0 = PASS, 1 = FAIL, 2 = WARN, 3 = ERROR
          if [ "${rc}" -eq 1 ] || [ "${rc}" -eq 3 ]; then
            echo "::error::OWASP ZAP baseline reported FAIL/ERROR (exit code ${rc})."
            exit "${rc}"
          fi

      - name: Publish scan summary
        if: always()
        run: |
          {
            echo "## OWASP ZAP Baseline"
            echo "- Target: ${TARGET_URL}"
            echo "- Exit code: ${{ steps.zap.outputs.exit_code }}"
            echo "- Reports are attached as workflow artifacts."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload ZAP report artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: owasp-zap-baseline-report
          path: zap-report/
          if-no-files-found: warn
