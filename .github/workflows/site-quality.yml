name: Site Quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: site-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  author-email-guard:
    uses: water-apps/waterapps-05-cicd-workflows/.github/workflows/commit-author-guard.yml@main
    with:
      allowed_emails: "varun.kaushik.au@gmail.com,varun@waterapps.com.au,65931645+vk103365@users.noreply.github.com"
      allowed_actors: "vkaushik13"

  checks:
    uses: water-apps/waterapps-05-cicd-workflows/.github/workflows/static-site-quality.yml@main
    with:
      check_script: scripts/check-site.sh

  portal-auth-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Install dependencies
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci --prefer-offline --no-audit

      - name: Run portal auth unit tests
        run: node --test tests/portal-auth.test.js
