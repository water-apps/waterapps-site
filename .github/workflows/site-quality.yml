name: Site Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  author-email-guard:
    uses: water-apps/waterapps-05-cicd-workflows/.github/workflows/commit-author-guard.yml@main
    with:
      allowed_emails: "varun.kaushik.au@gmail.com,varun@waterapps.com.au,65931645+vk103365@users.noreply.github.com"
      allowed_actors: "vkaushik13"

  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Make check script executable
        run: chmod +x scripts/check-site.sh

      - name: Run static site quality checks
        run: ./scripts/check-site.sh

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run functional smoke tests (release gate)
        run: node --test tests/functional-smoke.test.js

      - name: Run Playwright e2e tests (release gate)
        run: npx playwright test --project=chromium

  portal-auth-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"

      - name: Run portal auth unit tests
        run: node --test tests/portal-auth.test.js

  booking-availability-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "24"

      - name: Run booking availability unit tests
        run: node --test tests/booking-availability.test.js
