name: Deploy Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Determine release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail
          release_sha="$(git log -1 --format=%H)"
          release_version="$(git describe --tags --always --dirty 2>/dev/null || git rev-parse --short=12 HEAD)"
          release_ref="$(git rev-parse --abbrev-ref HEAD)"
          release_id="${release_sha}"
          release_created_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          {
            echo "release_sha=${release_sha}"
            echo "release_version=${release_version}"
            echo "release_ref=${release_ref}"
            echo "release_id=${release_id}"
            echo "release_created_at=${release_created_at}"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Assemble static site artifact
        env:
          BUILD_RELEASE_SHA: ${{ steps.release.outputs.release_sha }}
          BUILD_RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          BUILD_RELEASE_REF: ${{ steps.release.outputs.release_ref }}
          BUILD_RELEASE_ID: ${{ steps.release.outputs.release_id }}
          BUILD_RELEASE_CREATED_AT: ${{ steps.release.outputs.release_created_at }}
          BUILD_RELEASE_TARGET: github-pages
          BUILD_RELEASE_RUN_ID: ${{ github.run_id }}
          BUILD_RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
          BUILD_RELEASE_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash scripts/build-deploy-bundle.sh _site
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
